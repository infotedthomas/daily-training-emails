name = "training-reminders"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# KV namespace for templates + pending approvals
# Create with: wrangler kv:namespace create KV
# Then paste the ID below.
[[kv_namespaces]]
binding = "KV"
id = "0c751d2759924901af91367754c320a8"

# Cloudflare Workers AI — used to merge host changes into the email.
# No API key needed; billed against the account's free Workers AI allocation.
[ai]
binding = "AI"

# Cron triggers. The worker dispatches by the CURRENT Eastern time (see nowET in
# scheduled()), so each slot is listed at BOTH its EDT (UTC-4) and EST (UTC-5)
# UTC times; only the intended ET moment acts. ET slots:
#   12:00 PM ET — training reminders   (16:00 EDT / 17:00 EST)
#   12:40 PM ET — schedule training    (16:40 EDT / 17:40 EST)
#    1:30 PM ET — IBGS reminder (Thu)  (17:30 EDT / 18:30 EST)
#    1:45 PM ET — schedule IBGS (Thu)  (17:45 EDT / 18:45 EST)
[triggers]
crons = [
  "0 16,17 * * 1,2,4,5",
  "40 16,17 * * 1,2,4,5",
  "30 17,18 * * 4",
  "45 17,18 * * 4",
]

# Secrets (set via: wrangler secret put <NAME>)
#   SLACK_BOT_TOKEN    - xoxb-... Slack bot token
#   KIT_API_KEY        - Kit V4 API key
#   ADMIN_TOKEN        - shared secret guarding all non-health HTTP endpoints
# (AI uses the Workers AI binding above — no API key required.)

[vars]
# Public Worker URL, used to build the email preview link posted in Slack.
WORKER_URL = "https://training-reminders.web-0b3.workers.dev"

# Workers AI model used to merge host changes into the email (overridable).
AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# Slack channel where hosts post updates AND where previews/confirmations go
SLACK_CHANNEL_ID = "C0BDT6ZT0RE"

# Host Slack user IDs (profile > three dots > Copy member ID)
DAVID_SLACK_ID = "U01KUGST3NC"
LANCE_SLACK_ID = "UKJ3TGRQX"
JEFF_SLACK_ID  = "U09BH71A2RX"

# Coordinator who can post updates on behalf of any host (e.g. "David: ...").
ADMIN_SLACK_ID = "U020RQMJXS8"

# Kit email layout template ID (shared across all broadcasts).
# 0 = omit (Kit uses the account default). Footer is baked into the content
# templates, so a layout template isn't required. Set this only if you want a
# specific Kit layout — and if that layout adds its own footer, remove the one
# in the content templates to avoid duplication.
KIT_EMAIL_TEMPLATE_ID = "0"

# Subscriber targeting (Kit tags).
# Default for the 2 PM trainings (Mon/Tue/Thu/Fri): "Daily Zoom Meeting Training"
KIT_DEFAULT_FILTER_TYPE = "tag"
KIT_DEFAULT_FILTER_ID = "11620591"
# IBGS override: "Membership - IBGS"
KIT_THU_IBGS_FILTER_TYPE = "tag"
KIT_THU_IBGS_FILTER_ID = "13590636"
